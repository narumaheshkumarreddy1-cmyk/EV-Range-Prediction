<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Map - EV Navigation</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* Page-specific small overrides */
        html, body { height:100%; margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial; }
        #map { width:100vw; height:100vh; }
        .autocomplete-list { position:absolute; z-index:1400; left:0; right:0; background:#fff; border:1px solid #e6e6e6; max-height:240px; overflow:auto; border-radius:6px; box-shadow:0 8px 24px rgba(0,0,0,0.08); }
        .autocomplete-item { padding:10px 12px; cursor:pointer; border-bottom:1px solid #f3f3f3; }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background:#f7f8fb; }
    </style>
</head>
<body class="map-page">
    <div id="map"></div>

    <button class="map-nav-button" onclick="window.location.href='/dashboard'">← Back to Dashboard</button>

    <div class="map-overlay-controls">
        <h3>Where to?</h3>

        <div style="position:relative;">
            <input id="search-input" placeholder="Search address or place..." autocomplete="off" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px;">
            <div id="autocomplete-list" class="autocomplete-list" style="display:none;"></div>
        </div>

        <h3 style="margin-top:16px;">Filters</h3>
        <div class="filter-group" style="margin-top:8px;">
            <label><input type="checkbox" id="filter-fast" checked> Fast Charging ⚡⚡</label>
            <label><input type="checkbox" id="filter-standard" checked> Standard Charging ⚡</label>
            <label><input type="checkbox" id="filter-ac" checked> AC Charging</label>
        </div>

        <div style="display:flex;gap:8px;margin-top:12px;">
            <button id="recenter-btn" class="control-btn">Recenter</button>
            <button id="clear-route-btn" class="control-btn" style="background:#e74c3c;">Clear Route</button>
        </div>

        <div id="status-message" class="status-message" style="margin-top:10px;"></div>
    </div>

    <div class="map-overlay-stations">
        <h3>Nearby Stations</h3>
        <div id="stations-container"><p style="text-align:center;color:#888;">Loading stations...</p></div>
    </div>

    <div class="map-overlay-routes" id="route-panel" style="display:none;">
        <h3>Route Options</h3>
        <div id="routes-container"></div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/map.js"></script>
</body>
</html>
