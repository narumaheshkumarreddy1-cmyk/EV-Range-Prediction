<!DOCTYPE html>
<html>
<head>
    <title>EV Range Prediction</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>EV Range</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="{{ url_for('ev.dashboard_page') }}">🏠 Dashboard</a></li>
                <li><a href="{{ url_for('ev.profile_page') }}">👤 Profile</a></li>
                <li><a href="{{ url_for('ev.settings_page') }}">⚙️ Settings</a></li>
                <li><a href="{{ url_for('ev.map_page') }}">🗺️ Navigation</a></li>
                <li><a href="{{ url_for('ev.predict_page') }}" class="active">⚡ Prediction</a></li>
                <li><a href="#" onclick="handleLogout()">🚪 Logout</a></li>
            </ul>
        </nav>

        <div class="main-content">
            <div class="top-bar">
                <h1>EV Range Prediction System</h1>
                <div class="user-menu">
                    <img id="index-user-photo" src="/static/images/default-profile.png" alt="Profile" class="user-avatar">
                    <span id="index-username"></span>
                </div>
            </div>

            <div id="prediction-form-container">
                <div id="auth-required" style="display:none; margin:20px 0;">
                    <p>Please <a href="/login">login</a> or <a href="/signup">sign up</a> to use the prediction tool.</p>
                </div>

                <div id="prediction-form" style="display:none; max-width:900px; margin: 0 auto;">
                    <form action="{{ url_for('ev.predict') }}" method="POST">
                        <div class="form-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                            <div>
                                <div class="form-group">
                                    <label>Battery %:</label>
                                    <input type="number" name="battery" min="0" max="100" placeholder="0-100" required>
                                </div>

                                <div class="form-group">
                                    <label>Vehicle Load (kg):</label>
                                    <input type="number" name="load" min="0" placeholder="e.g., 1500" required>
                                </div>
                            </div>

                            <div>


                                <div class="form-group">
                                    <label>Destination (City/Address):</label>
                                    <input type="text" name="destination" id="destination" placeholder="e.g., Los Angeles, CA" required>
                                </div>
                            </div>

                            <div>
                                <div class="form-group">
                                    <label>
                                        <input type="checkbox" name="ac" value="on" id="ac">
                                        AC On
                                    </label>
                                </div>

                                <div class="form-group">
                                    <label>Traffic Condition:</label>
                                    <select name="traffic" id="traffic">
                                        <option value="low">Low</option>
                                        <option value="medium" selected>Medium</option>
                                        <option value="high">High</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <button type="submit" id="predict-btn">Predict Range</button>
                    </form>
                    
                    <!-- Feature 2: Live Battery and Range Display -->
                    <div id="live-display" style="display:none; margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 8px;">
                        <h3 style="margin-bottom: 15px; color: #667eea;">Live Vehicle Status</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="live-item">
                                <strong>Battery Percentage:</strong>
                                <span id="live-battery" style="font-size: 24px; color: #28a745; font-weight: bold;">--</span>%
                            </div>
                            <div class="live-item">
                                <strong>Predicted Range:</strong>
                                <span id="live-range" style="font-size: 24px; color: #667eea; font-weight: bold;">--</span> km
                            </div>
                        </div>
                        <div style="margin-top: 15px; padding: 10px; background: #e7f3ff; border-radius: 5px; text-align: center; color: #0066cc;">
                            <small>🔄 Auto updating every 10 minutes</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthentication();
            if (typeof updateIndexUserInfo === 'function') updateIndexUserInfo();
        });
    </script>
</body>
</html>
