<!DOCTYPE html>
<html>
<head>
    <title>Signup - EV Range Prediction</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h1>Create Account</h1>
        
        <div id="signup-form">
            <div class="form-group">
                <label>Username:</label>
                <input type="text" id="signup-username" placeholder="Choose a username">
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="signup-email" placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="signup-password" placeholder="At least 6 characters">
            </div>

            <div class="form-group">
                <label>Phone:</label>
                <input type="tel" id="signup-phone" placeholder="Your phone number">
            </div>

            <div class="form-group">
                <label>Location:</label>
                <input type="text" id="signup-location" placeholder="Your location">
            </div>

            <div class="form-group">
                <label>Car Company:</label>
                <select id="signup-car-company" required>
                    <option value="">Select a car company</option>
                </select>
            </div>

            <div class="form-group">
                <label>Car Model:</label>
                <select id="signup-car-model">
                    <option value="">Select a car model</option>
                </select>
            </div>

            <button onclick="handleSignup()">Sign Up</button>

            <p id="signup-message"></p>
        </div>

        <div class="auth-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        // Load car companies on page load
        document.addEventListener('DOMContentLoaded', loadCarCompanies);
        
        // Update car models when company changes
        document.getElementById('signup-car-company').addEventListener('change', loadCarModels);
    </script>
</body>
</html>
